name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          environments: dev
          frozen: true

      - name: Run tests
        run: pixi run --environment dev --clean-env test
